name: Deploy CTF

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t crypto-ctf .

      - name: Stop Old Container
        run: |
          docker stop crypto-ctf || true
          docker rm crypto-ctf || true

      - name: Start New Container
        run: docker run -d -p 80:80 --name crypto-ctf crypto-ctf
